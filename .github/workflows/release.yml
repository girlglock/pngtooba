name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: pngtooba
          path: pngtooba

      - name: zip release asset
        run: (cd pngtooba && zip -r "../pngtooba-${{ github.ref_name }}.zip" obs-studio)

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "pngtooba-${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --generate-notes
